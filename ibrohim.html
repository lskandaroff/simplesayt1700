<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Website</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    color:white;
}

.hero{
    padding:100px 0;
}

.card-custom{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border:none;
    border-radius:20px;
    transition:.3s;
}

.card-custom:hover{
    transform:translateY(-10px);
}

.btn-custom{
    background:#38bdf8;
    border:none;
    padding:12px 30px;
    border-radius:30px;
    color:white;
    font-weight:bold;
}

.btn-custom:hover{
    background:#0ea5e9;
}

footer{
    padding:30px;
    text-align:center;
    color:#cbd5e1;
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="#">MySite</a>
</div>
</nav>

<section class="hero">
<div class="container text-center">
<h1 class="display-3 fw-bold">Kelajak Dizayni</h1>
<p class="lead my-4">
Zamonaviy, tezkor va professional web sahifa.
</p>
<button class="btn btn-custom">Boshlash</button>
</div>
</section>

<div class="container pb-5">
<div class="row g-4">

<div class="col-md-4">
<div class="card card-custom p-4 text-center">
<h3>⚡ Tezkor</h3>
<p>Yuqori unumdorlik va zamonaviy texnologiyalar.</p>
</div>
</div>

<div class="col-md-4">
<div class="card card-custom p-4 text-center">
<h3>🎨 Dizayn</h3>
<p>Minimalistik va professional ko‘rinish.</p>
</div>
</div>

<div class="col-md-4">
<div class="card card-custom p-4 text-center">
<h3>🔒 Xavfsiz</h3>
<p>Foydalanuvchi ma'lumotlari himoyalangan.</p>
</div>
</div>

</div>
</div>

<footer>
© 2026 Barcha huquqlar himoyalangan
</footer>

</body>
</html>
